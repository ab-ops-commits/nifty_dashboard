<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nifty Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; background-color: #1a1a1a; color: #e0e0e0; }
        .ticker-list { width: 350px; background-color: #1a1a1a; padding: 0; overflow-y: auto; border-right: 1px solid #333; flex-shrink: 0; }
        .chart-container { flex: 1; display: flex; flex-direction: column; padding: 0; background-color: #1a1a1a; }
        .group-header { background-color: #2d3748; padding: 8px 12px; font-weight: bold; font-size: 0.9em; position: sticky; top: 0; z-index: 3; cursor: pointer; border-bottom: 1px solid #444; }
        .ticker-table { width: 100%; border-collapse: collapse; font-size: 0.8em; table-layout: fixed; }
        .ticker-table th { text-align: left; padding: 8px; background-color: #1a1a1a; cursor: pointer; font-weight: bold; border-bottom: 1px solid #333; color: #888; }
        .ticker-table td { padding: 8px; border-bottom: 1px solid #222; color: #e0e0e0; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ticker-row:hover { background-color: #2a2a2a; }
        .ticker-row.active { background-color: #374151; }
        .abc-rating { display: inline-block; width: 18px; height: 18px; border-radius: 50%; text-align: center; line-height: 18px; font-weight: bold; color: white; font-size: 0.75em; }
        .abc-a { background-color: #3b82f6; } .abc-b { background-color: #10b981; } .abc-c { background-color: #f59e0b; }
        .price-up { color: #10b981 !important; }
        .price-down { color: #ef4444 !important; }
        .rs-chart { width: 60px; height: 20px; display: block; filter: invert(1); }
        #tradingview-chart { flex: 1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #444; }
    </style>
</head>
<body>
    <div class="ticker-list" id="groups-container">
        <div style="padding:20px">Loading Nifty Data...</div>
    </div>
    <div class="chart-container">
        <div id="tradingview-chart"></div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
    (function() {
        let chart = null;
        let snapshot = null;
        let meta = null;

        function renderGroups() {
            if (!snapshot || !snapshot.groups) return;
            let html = '';
            // Use specific order if preferred, otherwise all keys
            const groupNames = ['Broad Indices', 'Sectoral Indices'];
            
            groupNames.forEach(gn => {
                const rows = snapshot.groups[gn];
                if (!rows || rows.length === 0) return;
                
                html += `<div class="group-header">${gn}</div>
                <table class="ticker-table">
                    <thead>
                        <tr>
                            <th style="width:35%">Ticker</th>
                            <th style="width:15%">Gr</th>
                            <th style="width:25%">Daily</th>
                            <th style="width:25%">VARS</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                rows.forEach(r => {
                    const daily = parseFloat(r.daily) || 0;
                    const cl = daily > 0 ? 'price-up' : (daily < 0 ? 'price-down' : '');
                    html += `<tr class="ticker-row" onclick="window.up('${r.ticker}')" id="r-${r.ticker}">
                        <td>${r.ticker}</td>
                        <td><span class="abc-rating abc-${(r.abc || 'C').toLowerCase()}">${r.abc || 'C'}</span></td>
                        <td class="${cl}">${daily}%</td>
                        <td><img src="${r.rs_chart}" class="rs-chart" onerror="this.style.display='none'"></td>
                    </tr>`;
                });
                html += '</tbody></table>';
            });
            
            document.getElementById('groups-container').innerHTML = html;
            
            // Auto-select first ticker
            for (let gn of groupNames) {
                if (snapshot.groups[gn] && snapshot.groups[gn].length > 0) {
                    window.up(snapshot.groups[gn][0].ticker);
                    break;
                }
            }
        }

        window.up = function(s) {
            document.querySelectorAll('.ticker-row').forEach(r => r.classList.remove('active'));
            const row = document.getElementById('r-'+s);
            if (row) row.classList.add('active');
            
            if (chart) {
                try { document.getElementById('tradingview-chart').innerHTML = ''; } catch(e) {}
            }
            
            const cleanSymbol = s.replace('^', '').replace('.NS', '');
            
            chart = new TradingView.widget({
                "autosize": true,
                "symbol": "NSE:" + cleanSymbol,
                "interval": "D",
                "timezone": "Asia/Kolkata",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_side_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview-chart"
            });
        };

        Promise.all([
            fetch('data/snapshot.json').then(r => r.json()),
            fetch('data/meta.json').then(r => r.json())
        ]).then(res => {
            snapshot = res[0];
            meta = res[1];
            renderGroups();
        }).catch(err => {
            console.error(err);
            document.getElementById('groups-container').innerHTML = 
                `<div style="padding:20px">Error loading data. Check console.</div>`;
        });
    })();
    </script>
</body>
</html>
